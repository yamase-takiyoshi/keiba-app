<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>競馬EV Pro</title>
<style>
:root{--bg:#111;--panel:#1d1d1d;--card:#222;--line:#383838;--txt:#f5f5f5;--muted:#aaa;--gold:#d8a817;--blue:#1f5fbf}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
.app{max-width:1280px;margin:auto;padding:28px}
.header{display:flex;gap:14px;align-items:center}
.logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#f6ce49,#8d6500);display:grid;place-items:center;font-size:28px}
h1{margin:0;font-size:25px}
.sub{color:var(--muted);font-size:13px;margin-top:3px}
.tabs{display:flex;gap:8px;margin:22px 0;border-bottom:1px solid var(--line);padding-bottom:12px}
.tab{padding:11px 17px;border:1px solid var(--line);background:var(--card);border-radius:9px;color:var(--txt);font-weight:700}
.tab.active{border-color:var(--gold);color:#ffd95a}
.main{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px}
.calHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.nav{width:54px;height:44px;border-radius:10px;border:1px solid var(--line);background:#2a2a2a;color:white;font-size:24px}
.month{font-size:25px;font-weight:900}
.week,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.week div{text-align:center;color:var(--muted);padding:8px}
.day{min-height:74px;border:1px solid var(--line);border-radius:10px;background:#1b1b1b;padding:9px;cursor:pointer}
.day.empty{border:none;background:transparent;cursor:default}
.day.selected{border-color:var(--gold);background:#40360d}
.num{font-weight:800}
.badge{display:inline-block;margin-top:9px;margin-right:4px;padding:3px 8px;border-radius:999px;font-size:11px}
.jra{background:#6b4d00;color:#ffd96a}.nar{background:#123e78;color:#9fc8ff}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
select,.info{width:100%;padding:13px;border-radius:10px;border:1px solid var(--line);background:#2a2a2a;color:var(--txt);font-size:15px}
.label{color:var(--muted);font-size:12px;margin:8px 0 5px}
.raceGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.race{border:1px solid var(--line);background:#1b1b1b;border-radius:11px;padding:14px;min-height:88px;cursor:pointer}
.race.active{border-color:var(--gold);background:#3a310c}
.race b{font-size:25px}
.race small{display:block;color:var(--muted);margin-top:5px}
.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(18,18,18,.96);border-top:1px solid var(--line);padding:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.btn{padding:14px;border-radius:10px;border:1px solid var(--line);background:#2b2b2b;color:white;font-weight:900;font-size:15px}
.btn.primary{background:var(--gold);color:#111}
@media(max-width:850px){.main{grid-template-columns:1fr}.raceGrid{grid-template-columns:repeat(2,1fr)}.app{padding:18px 12px 88px}.bottom{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🏆</div>
    <div>
      <h1>競馬EV Pro</h1>
      <div class="sub">GitHub Pages版 / JRA・NAR / カレンダー・開催場・レース選択</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active">レース選択</button>
    <button class="tab">リアルデータ</button>
    <button class="tab">分析</button>
    <button class="tab">買い目</button>
    <button class="tab">精算</button>
    <button class="tab">設定</button>
  </div>

  <div class="main">
    <section>
      <div class="calHead">
        <button class="nav" id="prev">‹</button>
        <div class="month" id="month"></div>
        <button class="nav" id="next">›</button>
      </div>
      <div class="week"><div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div></div>
      <div class="days" id="days"></div>
    </section>

    <section>
      <div class="info" id="status">受信データなし。netkeiba側のブリッジボタンから送ってください。</div>

      <div class="controls">
        <div>
          <div class="label">主催</div>
          <select id="host">
            <option>JRA</option>
            <option>NAR</option>
          </select>
        </div>
        <div>
          <div class="label">開催場</div>
          <select id="place">
            <option>札幌</option><option>函館</option><option>福島</option><option>新潟</option><option>東京</option><option>中山</option><option>中京</option><option>京都</option><option>阪神</option><option>小倉</option>
          </select>
        </div>
        <div>
          <div class="label">距離・コース</div>
          <select id="course">
            <option>芝1200m</option><option>芝1600m</option><option>芝1800m</option><option>芝2000m</option><option>ダ1200m</option><option>ダ1400m</option><option>ダ1800m</option>
          </select>
        </div>
        <div>
          <div class="label">馬場状態</div>
          <select id="ground">
            <option>良</option><option>稍重</option><option>重</option><option>不良</option>
          </select>
        </div>
      </div>

      <h2>レース選択</h2>
      <div class="raceGrid" id="raceGrid"></div>
    </section>
  </div>
</div>

<div class="bottom">
  <button class="btn primary" id="analyze">分析実行</button>
  <button class="btn" id="reload">実データ再読込</button>
  <button class="btn" id="clear">受信データ消去</button>
</div>

<script>
(() => {
  "use strict";

  const $ = id => document.getElementById(id);

  function pad(n){ return String(n).padStart(2,"0"); }

  function localDateStr(d){
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }

  function todayLocal(){
    return localDateStr(new Date());
  }

  function parseDate(str){
    const [y,m,d] = str.split("-").map(Number);
    return new Date(y, m - 1, d);
  }

  function ymFromDateStr(str){
    const [y,m] = str.split("-").map(Number);
    return { y, m };
  }

  const state = {
    selectedDate: null,
    calendarYear: null,
    calendarMonth: null,
    selectedRaceNo: 1,
    host: "JRA",
    place: "札幌",
    course: "芝1200m",
    ground: "良"
  };

  function save(){
    localStorage.setItem("keiba_ev_pro_state_v2", JSON.stringify(state));
  }

  function load(){
    try{
      const old = JSON.parse(localStorage.getItem("keiba_ev_pro_state_v2") || "{}");
      Object.assign(state, old || {});
    }catch(e){}
  }

  function initState(){
    load();

    // 初回だけ今日。以後は絶対に勝手に今日へ戻さない。
    if(!state.selectedDate){
      state.selectedDate = todayLocal();
    }

    if(!state.calendarYear || !state.calendarMonth){
      const ym = ymFromDateStr(state.selectedDate);
      state.calendarYear = ym.y;
      state.calendarMonth = ym.m;
    }

    $("host").value = state.host || "JRA";
    $("place").value = state.place || "札幌";
    $("course").value = state.course || "芝1200m";
    $("ground").value = state.ground || "良";
  }

  function hasJRA(dateStr){
    const d = parseDate(dateStr).getDay();
    return d === 0 || d === 6;
  }

  function hasNAR(dateStr){
    return true;
  }

  function renderCalendar(){
    const y = state.calendarYear;
    const m = state.calendarMonth;
    $("month").textContent = `${y}年 ${m}月`;

    const first = new Date(y, m - 1, 1);
    const last = new Date(y, m, 0);
    const days = $("days");
    days.innerHTML = "";

    for(let i=0;i<first.getDay();i++){
      const e = document.createElement("div");
      e.className = "day empty";
      days.appendChild(e);
    }

    for(let day=1; day<=last.getDate(); day++){
      const dateStr = `${y}-${pad(m)}-${pad(day)}`;
      const cell = document.createElement("div");
      cell.className = "day" + (dateStr === state.selectedDate ? " selected" : "");
      cell.innerHTML = `
        <div class="num">${day}</div>
        ${hasJRA(dateStr) ? '<span class="badge jra">JRA</span>' : ""}
        ${hasNAR(dateStr) ? '<span class="badge nar">NAR</span>' : ""}
      `;
      cell.onclick = () => selectDate(dateStr);
      days.appendChild(cell);
    }
  }

  function selectDate(dateStr){
    state.selectedDate = dateStr;

    const ym = ymFromDateStr(dateStr);
    state.calendarYear = ym.y;
    state.calendarMonth = ym.m;

    state.selectedRaceNo = 1;

    save();
    renderCalendar();
    renderRaces();
    updateStatus();
  }

  function renderRaces(){
    const grid = $("raceGrid");
    grid.innerHTML = "";

    for(let i=1;i<=12;i++){
      const card = document.createElement("div");
      card.className = "race" + (i === Number(state.selectedRaceNo) ? " active" : "");
      card.innerHTML = `
        <b>${i}R</b>
        <small>${state.course}</small>
        <small>${state.selectedDate}</small>
      `;
      card.onclick = () => selectRace(i);
      grid.appendChild(card);
    }
  }

  function selectRace(no){
    // 重要：ここで selectedDate を絶対に変更しない
    state.selectedRaceNo = Number(no);
    save();
    renderRaces();
    updateStatus();
  }

  function updateStatus(){
    $("status").textContent =
      `${state.selectedDate} ${state.place} ${state.selectedRaceNo}R / ${state.host} / ${state.course} / 馬場:${state.ground}`;
  }

  function moveMonth(delta){
    let y = state.calendarYear;
    let m = state.calendarMonth + delta;

    if(m <= 0){ y--; m = 12; }
    if(m >= 13){ y++; m = 1; }

    state.calendarYear = y;
    state.calendarMonth = m;

    // 重要：月移動だけでは selectedDate を今日へ戻さない
    save();
    renderCalendar();
  }

  ["host","place","course","ground"].forEach(id=>{
    $(id).addEventListener("change", e=>{
      state[id] = e.target.value;
      save();
      renderRaces();
      updateStatus();
    });
  });

  $("prev").onclick = () => moveMonth(-1);
  $("next").onclick = () => moveMonth(1);

  $("analyze").onclick = () => {
    alert(`${state.selectedDate} ${state.place} ${state.selectedRaceNo}R を分析します。\n※選択日は保持されています。`);
  };

  $("reload").onclick = () => {
    updateStatus();
    alert("再読込しました。選択日は変更していません。");
  };

  $("clear").onclick = () => {
    localStorage.removeItem("keiba_ev_pro_state_v2");
    state.selectedDate = todayLocal();
    const ym = ymFromDateStr(state.selectedDate);
    state.calendarYear = ym.y;
    state.calendarMonth = ym.m;
    state.selectedRaceNo = 1;
    save();
    renderCalendar();
    renderRaces();
    updateStatus();
  };

  initState();
  renderCalendar();
  renderRaces();
  updateStatus();
})();
</script>
</body>
</html>
